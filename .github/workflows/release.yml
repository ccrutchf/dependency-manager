name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    strategy:
      matrix:
        rid: [linux-x64, linux-arm64, osx-x64, osx-arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Determine version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Publish
        run: |
          dotnet publish src/DependencyManager/DependencyManager.csproj \
            -c Release -r ${{ matrix.rid }} \
            -o out/${{ matrix.rid }}

      - name: Package tarball
        run: |
          cd out/${{ matrix.rid }}
          tar czf ../../depend-${{ matrix.rid }}-${{ steps.ver.outputs.version }}.tar.gz depend

      - uses: actions/upload-artifact@v4
        with:
          name: depend-${{ matrix.rid }}
          path: depend-${{ matrix.rid }}-${{ steps.ver.outputs.version }}.tar.gz

  release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: depend-*
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: depend-*.tar.gz
          generate_release_notes: true
